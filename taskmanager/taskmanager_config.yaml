# Central settings for taskManager scripts and OpenFOAMCaseGenerator
# Edit this file instead of changing hardcoded values in Python files.

cluster:
  host: your-cluster-hostname
  remote_base_path: /path/to/remote/cfd_data

paths:
  template_path: ./template
  input_dir: /path/to/downloads
  output_dir: /path/to/openFoamCases

input_format:
  metadata_filename: pipeline_metadata.json
  folder_levels:
    - name: terrain_index
      prefix: terrain_
    - name: rotation_degree
      prefix: rotatedTerrain_
      suffix: _deg
  case_name_template: "case_{case_num:03d}_{terrain_index}_{rotation_degree:03d}deg"

openfoam:
  end_time: 20000
  write_interval: 5000
  run_stage_mesh: mesh

hpc:
  account: your-hpc-account
  partition: your-partition
  nodes: 1
  ntasks: 128
  walltime: "10:00:00"
  openfoam_version: your-openfoam-module
  email_id: your-email@example.com
  email_type: FAIL

parallel:
  mesh_workers: 4
  fetch_workers: 2

timeouts:
  job_status_ssh: 15
  remote_list_timesteps: 10
  fetch_postprocessing: 120
  fetch_log_list: 10
  fetch_single_log: 60
  fetch_last_timestep: 300

run_cases:
  n_cases_to_mesh: 4
  n_parallel_workers: 4
  auto_submit: true

monitor_jobs:
  check_interval_minutes: 120
  max_iterations: null
